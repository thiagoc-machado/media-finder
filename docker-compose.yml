name: home-server

x-common-env: &common-env
  PUID: '1000'
  PGID: '1000'
  TZ: Europe/Madrid

services:
  media-finder:
    build:
      # context: ./media-finder
      dockerfile: Dockerfile
    container_name: media-finder
    environment:
      APP_ENV: production
      APP_PORT: '8091'
      APP_SECRET_KEY: ${APP_SECRET_KEY:?set APP_SECRET_KEY in the environment}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      DATABASE_URL: sqlite:////config/media-finder.db

      QBITTORRENT_URL: ${QBITTORRENT_URL:-http://qbittorrent:8080}
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD}
      QBITTORRENT_CATEGORY_MOVIE: ${QBITTORRENT_CATEGORY_MOVIE:-movies}
      QBITTORRENT_CATEGORY_SERIES: ${QBITTORRENT_CATEGORY_SERIES:-series}
      QBITTORRENT_CATEGORY_ANIME: ${QBITTORRENT_CATEGORY_ANIME:-}
      QBITTORRENT_CATEGORY_OTHER: ${QBITTORRENT_CATEGORY_OTHER:-}
      QBITTORRENT_CONNECT_TIMEOUT_SECONDS: ${QBITTORRENT_CONNECT_TIMEOUT_SECONDS:-5}
      QBITTORRENT_OPERATION_TIMEOUT_SECONDS: ${QBITTORRENT_OPERATION_TIMEOUT_SECONDS:-15}
      QBITTORRENT_HEALTH_TIMEOUT_SECONDS: ${QBITTORRENT_HEALTH_TIMEOUT_SECONDS:-5}

      # TMDB
      TMDB_ENABLED: ${TMDB_ENABLED:-true}
      TMDB_AUTH_MODE: ${TMDB_AUTH_MODE:-bearer}
      TMDB_API_KEY: ${TMDB_API_KEY}
      TMDB_BASE_URL: ${TMDB_BASE_URL:-https://api.themoviedb.org/3}
      TMDB_IMAGE_BASE_URL: ${TMDB_IMAGE_BASE_URL:-https://image.tmdb.org/t/p}
      TMDB_LANGUAGE: ${TMDB_LANGUAGE:-pt-BR}
      TMDB_REGION: ${TMDB_REGION:-ES}
      TMDB_TIMEOUT_SECONDS: ${TMDB_TIMEOUT_SECONDS:-10}
      TMDB_CACHE_TTL_SECONDS: ${TMDB_CACHE_TTL_SECONDS:-3600}
      TMDB_MAX_RESULTS: ${TMDB_MAX_RESULTS:-20}
      TMDB_MAX_CONCURRENCY: ${TMDB_MAX_CONCURRENCY:-3}
      TMDB_ALLOW_HTTP: ${TMDB_ALLOW_HTTP:-false}

      # Torrentio
      TORRENTIO_ENABLED: ${TORRENTIO_ENABLED:-false}
      TORRENTIO_MANIFEST_URL: ${TORRENTIO_MANIFEST_URL:-}
      TORRENTIO_TIMEOUT_SECONDS: ${TORRENTIO_TIMEOUT_SECONDS:-20}
      TORRENTIO_CACHE_TTL_SECONDS: ${TORRENTIO_CACHE_TTL_SECONDS:-120}
      TORRENTIO_MAX_RESULTS: ${TORRENTIO_MAX_RESULTS:-200}
      TORRENTIO_MAX_CONCURRENCY: ${TORRENTIO_MAX_CONCURRENCY:-2}

      # MediaFusion
      MEDIAFUSION_ENABLED: ${MEDIAFUSION_ENABLED:-false}
      MEDIAFUSION_MANIFEST_URL: ${MEDIAFUSION_MANIFEST_URL:-}
      MEDIAFUSION_TIMEOUT_SECONDS: ${MEDIAFUSION_TIMEOUT_SECONDS:-20}
      MEDIAFUSION_CACHE_TTL_SECONDS: ${MEDIAFUSION_CACHE_TTL_SECONDS:-120}
      MEDIAFUSION_MAX_RESULTS: ${MEDIAFUSION_MAX_RESULTS:-200}
      MEDIAFUSION_MAX_CONCURRENCY: ${MEDIAFUSION_MAX_CONCURRENCY:-2}

      # Stremio addons
      STREMIO_ADDON_MAX_RESPONSE_BYTES: ${STREMIO_ADDON_MAX_RESPONSE_BYTES:-5242880}
      STREMIO_ADDON_MAX_REDIRECTS: ${STREMIO_ADDON_MAX_REDIRECTS:-2}
      STREMIO_ADDON_ALLOWED_SCHEMES: ${STREMIO_ADDON_ALLOWED_SCHEMES:-http,https}
      STREMIO_ADDON_ALLOW_PRIVATE_HOSTS: ${STREMIO_ADDON_ALLOW_PRIVATE_HOSTS:-false}

      # Metadata result store
      METADATA_RESULT_TOKEN_TTL_SECONDS: ${METADATA_RESULT_TOKEN_TTL_SECONDS:-900}
      METADATA_RESULT_STORE_MAX_ITEMS: ${METADATA_RESULT_STORE_MAX_ITEMS:-1000}
      METADATA_SHOW_SPECIALS: ${METADATA_SHOW_SPECIALS:-false}

      SONARR_URL: http://sonarr:8989
      SONARR_API_KEY: ${SONARR_API_KEY}

      RADARR_URL: http://radarr:7878
      RADARR_API_KEY: ${RADARR_API_KEY}

      PROWLARR_URL: ${PROWLARR_URL:-http://prowlarr:9696}
      PROWLARR_API_KEY: ${PROWLARR_API_KEY}

      JACKETT_URL: ${JACKETT_URL:-http://jackett:9117}
      JACKETT_API_KEY: ${JACKETT_API_KEY}

      DUCKDUCKGO_SEARCH_ENABLED: ${DUCKDUCKGO_SEARCH_ENABLED:-false}
      DUCKDUCKGO_SEARCH_TIMEOUT_SECONDS: ${DUCKDUCKGO_SEARCH_TIMEOUT_SECONDS:-10}
      DUCKDUCKGO_SEARCH_MAX_RESULTS: ${DUCKDUCKGO_SEARCH_MAX_RESULTS:-10}

      BOOKS_DIR: ${BOOKS_DIR:-/books}
      BOOKS_MAX_SIZE_BYTES: ${BOOKS_MAX_SIZE_BYTES:-104857600}
      BOOKS_DOWNLOAD_TIMEOUT_SECONDS: ${BOOKS_DOWNLOAD_TIMEOUT_SECONDS:-60}
      TORRENT_FILE_MAX_SIZE_BYTES: ${TORRENT_FILE_MAX_SIZE_BYTES:-20971520}

      TORRENT_INDEXER_URL: http://torrent-indexer:7006
    volumes:
      - /opt/appdata/media-finder:/config
      - /mnt/storage/Livros:/books
    ports:
      - '8091:8091'
    # depends_on:
      # - qbittorrent
    restart: unless-stopped
