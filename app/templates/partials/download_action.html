{% set download_media_type = view.result.media_type %}
{% set download_category = download_categories.get(download_media_type) if download_categories is defined else none %}
<div class="download-control" data-download-control
     data-media-type="{{ download_media_type or '' }}"
     data-category="{{ download_category or '' }}"
     data-download-capability="{{ view.result.download_capability }}"
     data-has-valid-magnet="{{ 'true' if (view.result.magnet_url or view.result.info_hash) else 'false' }}">
  <form class="download-form" hx-post="/downloads" hx-target="#download-feedback-{{ view.result_token }}" hx-swap="innerHTML">
    <input type="hidden" name="result_token" value="{{ view.result_token }}">
    <input type="hidden" name="paused" value="false">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <button class="button button-small download-button" type="submit" data-download-button disabled>Download</button>
  </form>
  <span class="download-reason" data-download-reason>Checking qBittorrent…</span>
  <div id="download-feedback-{{ view.result_token }}" class="download-feedback" aria-live="polite"></div>
</div>
