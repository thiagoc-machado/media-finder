<form class="metadata-search-form" action="/metadata/search" method="get" hx-get="/metadata/search" hx-target="#metadata-candidates" hx-indicator="#metadata-search-loading">
  <label class="search-input-wrap search-input-large">
    <span class="sr-only">Título da mídia</span>
    <span class="search-symbol" aria-hidden="true">⌕</span>
    <input type="search" name="query" placeholder="Ex.: Interstellar, Breaking Bad" minlength="2" maxlength="200" autocomplete="off" required>
  </label>
  <label class="select-wrap"><span class="sr-only">Tipo de mídia</span><select name="media_type"><option value="all">Todos os tipos</option><option value="movie">Filmes</option><option value="series">Séries</option></select></label>
  <button class="button button-primary" type="submit">Buscar mídia <span aria-hidden="true">→</span></button>
  <span id="metadata-search-loading" class="search-loading htmx-indicator" role="status"><span class="spinner" aria-hidden="true"></span> Consultando TMDB…</span>
  <div class="age-filter" aria-label="Filtro de classificação etária">
    <div class="age-filter-heading"><label for="metadata-age-limit">Classificação máxima</label><output id="metadata-age-output" data-age-output for="metadata-age-limit">13 anos</output></div>
    <input id="metadata-age-limit" class="age-range" type="range" name="age_limit" min="0" max="18" step="1" value="13" list="metadata-age-ticks" data-age-filter aria-valuetext="13 anos">
    <datalist id="metadata-age-ticks"><option value="0"><option value="1"><option value="2"><option value="3"><option value="4"><option value="5"><option value="6"><option value="7"><option value="8"><option value="9"><option value="10"><option value="11"><option value="12"><option value="13"><option value="14"><option value="15"><option value="16"><option value="17"><option value="18"></datalist>
    <div class="age-range-labels" aria-hidden="true"><span>Livre <b>0</b></span><span>5</span><span>10</span><span class="age-default-mark">13</span><span>15</span><span>18 <b>Sem restrição</b></span></div>
    <p>Filtra filmes e séries acima da classificação escolhida.</p>
  </div>
</form>
